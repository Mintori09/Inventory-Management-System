name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./backend exec -- npx prisma generate
      - run: pnpm --filter ./backend exec -- npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      - run: pnpm --filter ./backend db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      - run: pnpm --filter ./backend test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
          JWT_SECRET: test-secret
          NODE_ENV: test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./frontend lint
      - run: pnpm --filter ./frontend test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
